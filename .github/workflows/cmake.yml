name: cmake

on:
  push:
    branches:
      - 'main'
      - 'dev**'

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  cmake:
    name: cmake
    runs-on: ${{matrix.os}}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-22.04-arm, ubuntu-24.04-arm, self-hosted-rhel-8]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: 'recursive'

    - name: Setup Dependencies
      if: contains(matrix.os, 'ubuntu') == true
      run: |
        sudo apt-get update -y -qq
        sudo apt-get install libelf-dev ninja-build

    - name: Configure
      run: cmake -G Ninja -B BUILD -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DMWR_BUILD_TESTS=ON

    - name: Build
      run: cmake --build BUILD

    - name: Test
      working-directory: BUILD
      run: ctest -C ${{env.BUILD_TYPE}} --output-on-failure

    - name: Upload Logs
      uses: actions/upload-artifact@v7
      if: '!cancelled()'
      with:
        name: ${{github.event.repository.name}}-logs-${{matrix.os}}
        path: |
            BUILD/.ninja_log
            BUILD/CMakeCache.txt
            BUILD/msbuild.binlog
            BUILD/Testing/Temporary/LastTest.log
        include-hidden-files: true
        retention-days: 7
